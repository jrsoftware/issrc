name: code-review-claude-code

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - code-review

jobs:
  claude-review:
    # Only set the topic `has-claude-code-oauth-token` if the secret is available
    if: contains(github.event.repository.topics, 'has-claude-code-oauth-token')
    runs-on: ubuntu-latest
    permissions:
      contents: read       # for actions/checkout
      pull-requests: write # for gh pr
      id-token: write      # for OIDC token exchange of claude-code-action
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the changes in PR #${{ github.event.pull_request.number }} of repository ${{ github.repository }}.
            Steps:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the changes.
            2. Run `gh pr view ${{ github.event.pull_request.number }} --json comments` to see any previous review comments.
            3. Analyze the diff for bugs, security issues, and style problems. Focus only on the changed lines, not pre-existing issues.
            4. Read CLAUDE.md and AGENTS.md in full for project-specific guidelines and verify compliance.
            5. Do not repeat issues already mentioned in previous review comments, and do not report the same issue twice in a single review.
            Post exactly one top-level PR comment using `gh pr comment`, either with findings or stating that no issues were found.
            Do not post inline review comments and do not submit review text as messages.
            Keep the review concise and actionable.
          claude_args: |
            --model opus
            --allowedTools "Read,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
